<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Tourist Spot | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-md p-8">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">Add New Tourist Spot</h1>
        
        <!-- Alerts for Backend Responses -->
        {% if success %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
            <strong class="font-bold">Success!</strong>
            <span class="block sm:inline">{{ success }}</span>
        </div>
        {% endif %}
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
            <strong class="font-bold">Error!</strong>
            <span class="block sm:inline">{{ error }}</span>
        </div>
        {% endif %}
        
        <!-- Form configured for backend file uploads -->
        <form method="POST" action="/test-uploader" enctype="multipart/form-data" class="space-y-6">
            
            <!-- Basic Information -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h2 class="text-xl font-semibold mb-4">Basic Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Name</label>
                        <input type="text" name="name" required class="w-full p-2 border rounded" placeholder="e.g. Wonderland Hot Spring">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Category</label>
                        <input type="text" name="category" class="w-full p-2 border rounded" placeholder="e.g. Resort">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Address</label>
                        <input type="text" name="address" class="w-full p-2 border rounded" placeholder="e.g. Calamba City, Laguna">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Municipality ID</label>
                        <input type="number" name="municipality_id" class="w-full p-2 border rounded" placeholder="1">
                    </div>
                </div>
            </div>

            <!-- Hook & Description -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h2 class="text-xl font-semibold mb-4">Content Details</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Hook Title</label>
                        <input type="text" name="hook_title" class="w-full p-2 border rounded" placeholder="e.g. Escape to Nature's Perfect Oasis">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Hook Text</label>
                        <textarea name="hook_text" rows="2" class="w-full p-2 border rounded" placeholder="Short inspiring description..."></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Main Description</label>
                        <textarea name="description" rows="4" class="w-full p-2 border rounded" placeholder="Detailed overview..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Media Upload -->
            <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                <h2 class="text-xl font-semibold mb-4 text-blue-800">Media</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Main Image</label>
                        <input type="file" name="main_image" accept="image/*" required class="w-full p-2 border bg-white rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Gallery Images (Multiple)</label>
                        <input type="file" name="gallery_images" accept="image/*" multiple class="w-full p-2 border bg-white rounded">
                    </div>
                </div>
            </div>

            <!-- Practical Info -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h2 class="text-xl font-semibold mb-4">Practical Information</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Opening Hours</label>
                        <input type="text" name="opening_hours" class="w-full p-2 border rounded" placeholder="6:00 AM - 10:00 PM">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Entrance Fees</label>
                        <textarea name="entrance_fees" rows="2" class="w-full p-2 border rounded" placeholder="Adults: ₱300, Kids: ₱150"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">What to Bring</label>
                        <input type="text" name="what_to_bring" class="w-full p-2 border rounded" placeholder="Swimwear, towel, extra clothes">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Parking Info</label>
                        <input type="text" name="parking_info" class="w-full p-2 border rounded" placeholder="Free parking available">
                    </div>
                </div>
            </div>

            <!-- JSON Data Elements -->
            <div class="bg-gray-50 p-4 rounded-lg border">
                <h2 class="text-xl font-semibold mb-4">Lists (Comma Separated)</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">Highlights (What makes it special?)</label>
                        <input type="text" name="highlights" class="w-full p-2 border rounded" placeholder="Natural Hot Springs, Private Cottages, Lush Gardens">
                        <p class="text-xs text-gray-500 mt-1">Separate each item with a comma.</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Target Audience</label>
                        <input type="text" name="target_audience" class="w-full p-2 border rounded" placeholder="Families, Couples, Professionals">
                    </div>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded transition-colors">
                Upload Data to Supabase via Python
            </button>
        </form>
    </div>
</body>
</html>
