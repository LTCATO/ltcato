<aside id="layout-menu" class="layout-menu menu-vertical menu bg-menu-theme">
    <div class="app-brand demo d-flex align-items-center px-4 py-4 mb-2">
      <a href="/dashboard" class="app-brand-link d-flex align-items-center gap-3 text-decoration-none w-100">

    <div class="menu-inner-shadow"></div>

        </a>

      <!-- Decision Support -->
      <li class="menu-item">
        <a href="#" class="menu-link">

        </a>
      </li>

      <!-- Arrivals -->
      <li class="menu-item {% if 'arrivals' in menu %}active{% endif %}">
        <a href="/dashboard/arrivals" class="menu-link">

      <!-- Accounts -->
      <li class="menu-item {% if 'accounts' in menu %}active{% endif %}">
        <a href="/dashboard/accounts" class="menu-link">

          <div data-i18n="Accounts">Accounts</div>
        </a>

      <!-- Feedback -->
      <li class="menu-item">
        <a href="#" class="menu-link">
          <i class="menu-icon tf-icons bx bx-message-square-detail"></i>
